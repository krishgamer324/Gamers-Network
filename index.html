<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamers Network</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1920') center center/cover no-repeat;
min-height:100vh;
overflow-x:hidden;
color:white;
animation:zoom 20s infinite alternate;
}

@keyframes zoom{
from{background-size:100%;}
to{background-size:110%;}
}

.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
padding:30px;
text-align:center;
}

.logo{
width:300px;
max-width:80%;
display:block;
margin:0 auto;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{
filter:drop-shadow(0 0 10px #00aaff);
}
to{
filter:drop-shadow(0 0 35px #00aaff);
}
}

.title{
font-size:55px;
font-weight:bold;
margin-top:15px;
}

.subtitle{
font-size:25px;
margin-bottom:30px;
color:#ddd;
}

.cards{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
margin-top:30px;
}

.card{
width:300px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border-radius:20px;
padding:25px;
transition:.4s;
animation:float 4s ease-in-out infinite;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 25px #00aaff;
}

@keyframes float{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-10px);
}
}

.card h2{
margin-bottom:15px;
}

.status{
font-size:22px;
color:#2ecc71;
}

.buttons{
margin-top:40px;
}

.btn{
display:inline-block;
padding:15px 35px;
margin:10px;
background:#00aaff;
border-radius:10px;
color:white;
text-decoration:none;
font-size:18px;
transition:.3s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 25px #00aaff;
}

footer{
margin-top:50px;
font-size:18px;
opacity:.8;
}

.particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.particle{
position:absolute;
width:5px;
height:5px;
background:white;
border-radius:50%;
opacity:.6;
animation:fall linear infinite;
}

@keyframes fall{
from{
transform:translateY(-100px);
}
to{
transform:translateY(110vh);
}
}
</style>
</head>

<body>

<div class="particles">
<span class="particle" style="left:10%;animation-duration:8s;"></span>
<span class="particle" style="left:20%;animation-duration:12s;"></span>
<span class="particle" style="left:30%;animation-duration:10s;"></span>
<span class="particle" style="left:40%;animation-duration:14s;"></span>
<span class="particle" style="left:50%;animation-duration:9s;"></span>
<span class="particle" style="left:60%;animation-duration:11s;"></span>
<span class="particle" style="left:70%;animation-duration:13s;"></span>
<span class="particle" style="left:80%;animation-duration:10s;"></span>
<span class="particle" style="left:90%;animation-duration:15s;"></span>
</div>

<div class="overlay">

<img src="logo.png" class="logo">

<div class="subtitle">
Minecraft Network Opening Soon!
</div>

<div class="cards">

<div class="card">
<h2>🔥 Lifesteal SMP</h2>
<p>Fight, survive and dominate.</p>
</div>

<div class="card">
<h2>⚔️ BedWars</h2>
<p>Protect your bed and conquer enemies.</p>
</div>

<div class="card">
<h2>📊 Server Status</h2>
<p class="status">Coming Soon</p>
</div>

</div>

<div class="buttons">
<a href="#" class="btn">🎮 Play Soon</a>

<a href="https://www.youtube.com/@KRISHgamer_op" target="_blank" class="btn">
📺 YouTube
</a>

<a href="https://discord.com/invite/kEysV2Urww" target="_blank" class="btn">
💬 Discord
</a>
</div>

<footer>
© 2026 Gamers Network • Play. Compete. Conquer.
</footer>

</div>

</body>
</html>
